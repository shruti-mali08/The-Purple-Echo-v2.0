<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: #0d0b14;">
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#d0bfff" stop-opacity="0.5" />
      <stop offset="70%" stop-color="#8a5cf5" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8a5cf5" stop-opacity="0" />
    </radialGradient>

    <g id="star-4point">
      <circle cx="0" cy="0" r="45" fill="url(#starGlow)" />

      <path 
        d="M 0,-40 Q 0,0 40,0 Q 0,0 0,40 Q 0,0 -40,0 Q 0,0 0,-40 Z" 
        fill="#ffffff" 
      />

      <path 
        d="M 0,-15 Q 0,0 60,0 Q 0,0 0,15 Q 0,0 -60,0 Q 0,0 0,-15 Z" 
        fill="#ffffff" 
        opacity="0.4" 
      />

      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
  </defs>

  <use href="#star-4point" x="200" y="200" transform="scale(1.2)" transform-origin="200 200" />
  <use href="#star-4point" x="400" y="300" transform="scale(0.8)" transform-origin="400 300" opacity="0.85" />
  <use href="#star-4point" x="550" y="150" transform="scale(0.5)" transform-origin="550 150" opacity="0.7" />
</svg>
